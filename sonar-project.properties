sonar.projectKey=ericfisherdev_nestova
sonar.organization=ericfisherdev-os


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=nestova
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Explicit test classification.
#
# Left unset, the Go analyzer and the text/secrets analyzer apply different
# heuristics and disagree about what a test is: the Go analyzer keys off the
# "_test.go" suffix, while the secrets analyzer also treats any directory named
# -- or ending in -- "test"/"tests"/"doc"/"docs" as tests and skips it. Stating
# it explicitly makes the classification identical for every sensor.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Generated code. templ compiles .templ files to *_templ.go, which are committed
# so CI can verify they are in sync -- but they are machine output, and holding
# generated code to hand-written quality standards produces findings nobody can
# act on without regenerating them straight back.
sonar.exclusions=**/*_templ.go

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Coverage profile produced by `make test` in the build job and handed to the
# scan as a workflow artifact. Go's native -coverprofile format is read
# directly, so no conversion step is needed.
sonar.go.coverage.reportPaths=coverage.out
