name: PR Title

# Rebase-and-merge preserves individual commit messages (linted by the
# commit-lint job in ci.yml), but a squash merge would use the PR title as the
# commit subject — so validate the title against Conventional Commits too.
on:
  pull_request:
    # Only the title matters here, so re-run when it can change — not on every
    # pushed commit (synchronize).
    types: [opened, edited, reopened]
    branches: [main]

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            style
            revert
